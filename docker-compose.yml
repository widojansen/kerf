# Kerf Docker Compose — Kerf service only.
# PostgreSQL, vLLM, Ollama, and SearXNG run as existing host services.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f kerf
#   docker compose exec kerf /app/docker-entrypoint.sh remote   # IEx shell
#
# Build:
#   docker compose build
#   docker build -t kerf-sandbox:latest container/              # sandbox image

services:
  kerf:
    build:
      context: .
      dockerfile: Dockerfile
    image: kerf:latest
    container_name: kerf
    network_mode: host
    restart: unless-stopped
    volumes:
      # Docker socket — required for Container.Manager sandbox spawning
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data
      - kerf_data:/app/data
      - kerf_workspaces:/app/workspaces
      - kerf_telemetry:/app/telemetry_fallback
      - kerf_whatsapp_auth:/app/whatsapp_auth
    env_file:
      - .env
    environment:
      # Dashboard binds 0.0.0.0 in Docker (override prod.exs default of 127.0.0.1)
      DASHBOARD_IP: "0.0.0.0"
      DASHBOARD_PORT: "4000"
      # Data paths (match volume mounts)
      KERF_DATA_DIR: "/app/data"
      KERF_WORKSPACES_DIR: "/app/workspaces"
      KERF_TELEMETRY_DIR: "/app/telemetry_fallback"

volumes:
  kerf_data:
  kerf_workspaces:
  kerf_telemetry:
  kerf_whatsapp_auth:
